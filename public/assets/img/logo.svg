<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#0f0f0f"/>

  <!-- Film reel part 1 (Teal/Cyan - Primary) -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#20c997" stroke-width="8" opacity="0.3"/>

  <!-- Film reel part 2 (Purple - Secondary) -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#8e44ad" stroke-width="6" opacity="0.5"/>

  <!-- Inner circle -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#20c997" stroke-width="4"/>

  <!-- Film strip frames -->
  <rect x="50" y="85" width="15" height="30" fill="#20c997" opacity="0.7"/>
  <rect x="135" y="85" width="15" height="30" fill="#20c997" opacity="0.7"/>
  <rect x="85" y="50" width="30" height="15" fill="#8e44ad" opacity="0.7"/>
  <rect x="85" y="135" width="30" height="15" fill="#8e44ad" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="8" fill="#20c997"/>

  <!-- Play button overlay -->
  <polygon points="85,90 85,110 105,100" fill="#8e44ad" opacity="0.8"/>
</svg>
